name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: write

jobs:
  version-check:
    name: Version check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: extract
        name: Extract and verify version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if [ "${TAG}" != "v${VERSION}" ]; then
            echo "::error::Tag ${TAG} does not match Cargo.toml version v${VERSION}"
            exit 1
          fi

          echo "Tag ${TAG} matches Cargo.toml version ${VERSION}"

  build:
    name: Build ${{ matrix.target }}
    needs: version-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
          # i686 (x86-32) is a BEST-EFFORT / COMMUNITY / UNTESTED artifact (T6 / G5).
          # There is no free i686 runner to runtime-test it, so it is build-only and must
          # NEVER block the x86-64/arm64 release. The build step uses continue-on-error and
          # packaging is skipped, so a compile failure here cannot fail the release job.
          - target: i686-pc-windows-msvc
            os: windows-latest
            build_only: true
          - target: x86_64-unknown-freebsd
            os: ubuntu-latest
            cross: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }} -p forgum-engine

      - name: Build (native)
        if: ${{ !matrix.cross }}
        # i686 is best-effort/community (T6 / G5): do NOT fail the release if it cannot
        # compile against windows-sys / crossterm on x86-32. Only the build step is
        # continue-on-error; packaging + upload below still skip build_only targets.
        continue-on-error: ${{ matrix.build_only || false }}
        run: cargo build --release --locked --target ${{ matrix.target }} -p forgum-engine

      - name: Package (unix)
        if: ${{ runner.os != 'Windows' }}
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../forgum-engine-${{ matrix.target }}.tar.gz forgum-engine ../../../README.md
          sha256sum ../../forgum-engine-${{ matrix.target }}.tar.gz > ../../forgum-engine-${{ matrix.target }}.sha256
          cd ../../..

      # Windows packaging is restricted to the rigorously-tested x86-64 / arm64 targets.
      # i686 (build_only) is skipped entirely — it is not runtime-tested and does not
      # produce a supported archive.
      - name: Package (windows)
        if: ${{ runner.os == 'Windows' && !matrix.build_only }}
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../forgum-engine-${{ matrix.target }}.tar.gz forgum-engine.exe ../../../README.md
          sha256sum ../../forgum-engine-${{ matrix.target }}.tar.gz > ../../forgum-engine-${{ matrix.target }}.sha256
          cd ../../..

      # Windows zip artifacts consumed by the winget + scoop manifests.
      - name: Package (windows zip)
        if: ${{ runner.os == 'Windows' && !matrix.build_only }}
        shell: bash
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          SRC_DIR="$GITHUB_WORKSPACE/target/${{ matrix.target }}/release"
          ROOT_DIR="$GITHUB_WORKSPACE"

          ZIP_NAME=""
          case "${{ matrix.target }}" in
            x86_64-pc-windows-msvc)   ZIP_NAME="forgum-${VERSION}-windows-x64.zip" ;;
            aarch64-pc-windows-msvc)  ZIP_NAME="forgum-${VERSION}-windows-arm64.zip" ;;
            *) echo "::error::Unknown windows target ${{ matrix.target }}"; exit 1 ;;
          esac

          TMPDIR=$(mktemp -d)
          cp "$SRC_DIR/forgum-engine.exe" "$TMPDIR/forgum-engine.exe"
          cp "$ROOT_DIR/README.md" "$TMPDIR/README.md"
          cd "$TMPDIR"
          zip -r "$ROOT_DIR/$ZIP_NAME" . >/dev/null
          sha256sum "$ROOT_DIR/$ZIP_NAME" > "$ROOT_DIR/$ZIP_NAME.sha256"

      - name: Upload artifacts
        # Skip upload for the build_only i686 lane: it produces no packaged archive and
        # is not a supported release artifact.
        if: ${{ !matrix.build_only }}
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            forgum-engine-${{ matrix.target }}.tar.gz
            forgum-engine-${{ matrix.target }}.sha256
            forgum-*-windows-*.zip
            forgum-*-windows-*.sha256
            # L3 packaging artifacts (built by the `packages` job below, which the
            # `release` job depends on). upload-artifact ignores globs with no
            # matches, but every one of these is expected to exist for a tag build.
            packaging/windows/*.msi
            packaging/choco/*.nupkg
            forgum-*-linux-*.deb
            forgum-*-linux-*.rpm

  packages:
    name: Build release packages (deb, rpm, nix, pacman)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build deb
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev
          chmod +x packaging/deb/build-deb.sh
          ./packaging/deb/build-deb.sh

      - name: Build rpm
        run: |
          sudo apt-get update && sudo apt-get install -y rpm
          chmod +x packaging/rpm/build-rpm.sh
          ./packaging/rpm/build-rpm.sh

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Nix build
        run: nix build

      - name: Build pacman
        uses: docker://archlinux:latest
        with:
          entrypoint: bash
          args: >-
            -c "pacman -Syu --noconfirm base-devel &&
                chmod +x packaging/pacman/build-pacman.sh &&
                ./packaging/pacman/build-pacman.sh"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: |
            forgum-*-linux-*.deb
            forgum-*-linux-*.rpm

  packages-win:
    name: Build release packages (msi, choco)
    needs: [build]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build engine
        run: cargo build --release -p forgum-engine

      - name: Install WiX
        continue-on-error: true
        run: choco install wixtoolset -y

      - name: Build msi
        shell: bash
        run: |
          set -e
          BIN_DIR="$GITHUB_WORKSPACE/target/release"
          export PATH="$PATH:/c/Program Files (x86)/WiX Toolset v3.11/bin"
          candle -dBinDir="$BIN_DIR" packaging/windows/forgum.wxs -o forgum.wixobj
          light forgum.wixobj -o packaging/windows/forgum.msi

      - name: Build choco nupkg
        shell: bash
        run: choco pack packaging/choco/forgum.nuspec --outputdirectory packaging/choco

      - name: Upload Windows package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-win
          path: |
            packaging/windows/*.msi
            packaging/choco/*.nupkg

  release:
    name: Create GitHub Release
    needs: [version-check, build, packages, packages-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Forgum ${{ needs.version-check.outputs.version }}"
          generate_release_notes: true
          files: artifacts/*
